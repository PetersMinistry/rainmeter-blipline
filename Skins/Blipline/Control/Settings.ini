X=344
Y=18
Shape=Rectangle 0,0,24,24,7 | Fill Color 255,255,255,12 | StrokeWidth 1 | Stroke Color #ButtonEdge#
LeftMouseUpAction=[!DeactivateConfig "#ROOTCONFIG#\Control"]

