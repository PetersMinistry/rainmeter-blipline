IfTrueAction3=[!SetVariable TemplateFill1 "#ButtonFill#"][!SetVariable TemplateEdge1 "#ButtonEdge#"][!SetVariable TemplateFill2 "#ButtonFill#"][!SetVariable TemplateEdge2 "#ButtonEdge#"][!SetVariable TemplateFill3 "#AccentSoft#"][!SetVariable TemplateEdge3 "#AccentColor#"][!SetVariable TemplateFill4 "#ButtonFill#"][!SetVariable TemplateEdge4 "#ButtonEdge#"][!SetVariable TemplateFill5 "#ButtonFill#"][!SetVariable TemplateEdge5 "#ButtonEdge#"][!SetVariable TemplateFill6 "#ButtonFill#"][!SetVariable TemplateEdge6 "#ButtonEdge#"][!SetVariable TemplateFill7 "#ButtonFill#"][!SetVariable TemplateEdge7 "#ButtonEdge#"]
IfCondition4=(MeasureLayoutState = 4)
IfTrueAction4=[!SetVariable TemplateFill1 "#ButtonFill#"][!SetVariable TemplateEdge1 "#ButtonEdge#"][!SetVariable TemplateFill2 "#ButtonFill#"][!SetVariable TemplateEdge2 "#ButtonEdge#"][!SetVariable TemplateFill3 "#ButtonFill#"][!SetVariable TemplateEdge3 "#ButtonEdge#"][!SetVariable TemplateFill4 "#AccentSoft#"][!SetVariable TemplateEdge4 "#AccentColor#"][!SetVariable TemplateFill5 "#ButtonFill#"][!SetVariable TemplateEdge5 "#ButtonEdge#"][!SetVariable TemplateFill6 "#ButtonFill#"][!SetVariable TemplateEdge6 "#ButtonEdge#"][!SetVariable TemplateFill7 "#ButtonFill#"][!SetVariable TemplateEdge7 "#ButtonEdge#"]
IfCondition5=(MeasureLayoutState = 5)
IfTrueAction5=[!SetVariable TemplateFill1 "#ButtonFill#"][!SetVariable TemplateEdge1 "#ButtonEdge#"][!SetVariable TemplateFill2 "#ButtonFill#"][!SetVariable TemplateEdge2 "#ButtonEdge#"][!SetVariable TemplateFill3 "#ButtonFill#"][!SetVariable TemplateEdge3 "#ButtonEdge#"][!SetVariable TemplateFill4 "#ButtonFill#"][!SetVariable TemplateEdge4 "#ButtonEdge#"][!SetVariable TemplateFill5 "#AccentSoft#"][!SetVariable TemplateEdge5 "#AccentColor#"][!SetVariable TemplateFill6 "#ButtonFill#"][!SetVariable TemplateEdge6 "#ButtonEdge#"][!SetVariable TemplateFill7 "#ButtonFill#"][!SetVariable TemplateEdge7 "#ButtonEdge#"]
IfCondition6=(MeasureLayoutState = 6)
IfTrueAction6=[!SetVariable TemplateFill1 "#ButtonFill#"][!SetVariable TemplateEdge1 "#ButtonEdge#"][!SetVariable TemplateFill2 "#ButtonFill#"][!SetVariable TemplateEdge2 "#ButtonEdge#"][!SetVariable TemplateFill3 "#ButtonFill#"][!SetVariable TemplateEdge3 "#ButtonEdge#"][!SetVariable TemplateFill4 "#ButtonFill#"][!SetVariable TemplateEdge4 "#ButtonEdge#"][!SetVariable TemplateFill5 "#ButtonFill#"][!SetVariable TemplateEdge5 "#ButtonEdge#"][!SetVariable TemplateFill6 "#AccentSoft#"][!SetVariable TemplateEdge6 "#AccentColor#"][!SetVariable TemplateFill7 "#ButtonFill#"][!SetVariable TemplateEdge7 "#ButtonEdge#"]
IfCondition7=(MeasureLayoutState = 7)
IfTrueAction7=[!SetVariable TemplateFill1 "#ButtonFill#"][!SetVariable TemplateEdge1 "#ButtonEdge#"][!SetVariable TemplateFill2 "#ButtonFill#"][!SetVariable TemplateEdge2 "#ButtonEdge#"][!SetVariable TemplateFill3 "#ButtonFill#"][!SetVariable TemplateEdge3 "#ButtonEdge#"][!SetVariable TemplateFill4 "#ButtonFill#"][!SetVariable TemplateEdge4 "#ButtonEdge#"][!SetVariable TemplateFill5 "#ButtonFill#"][!SetVariable TemplateEdge5 "#ButtonEdge#"][!SetVariable TemplateFill6 "#ButtonFill#"][!SetVariable TemplateEdge6 "#ButtonEdge#"][!SetVariable TemplateFill7 "#AccentSoft#"][!SetVariable TemplateEdge7 "#AccentColor#"]
