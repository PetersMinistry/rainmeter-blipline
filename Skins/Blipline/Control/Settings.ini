Formula=#LayoutTemplateIndex#
IfCondition=(MeasureLayoutState = 1)
IfTrueAction=[!SetVariable TemplateFill1 "#AccentSoft#"][!SetVariable TemplateEdge1 "#AccentColor#"][!SetVariable TemplateFill2 "#ButtonFill#"][!SetVariable TemplateEdge2 "#ButtonEdge#"][!SetVariable TemplateFill3 "#ButtonFill#"][!SetVariable TemplateEdge3 "#ButtonEdge#"][!SetVariable TemplateFill4 "#ButtonFill#"][!SetVariable TemplateEdge4 "#ButtonEdge#"][!SetVariable TemplateFill5 "#ButtonFill#"][!SetVariable TemplateEdge5 "#ButtonEdge#"][!SetVariable TemplateFill6 "#ButtonFill#"][!SetVariable TemplateEdge6 "#ButtonEdge#"][!SetVariable TemplateFill7 "#ButtonFill#"][!SetVariable TemplateEdge7 "#ButtonEdge#"]
