[MeterCountdownTag]
Meter=Shape
X=#CountdownX#
Y=#CountdownY#
Shape=Path Tag | Fill Color #CountdownTagFill# | StrokeWidth 1 | Stroke Color #AccentColor#
Shape2=Path Glow | Fill Color #CountdownGlow# | StrokeWidth 0
Shape3=Rectangle 0,0,0,0 | Fill Color 0,0,0,0 | StrokeWidth 0
Tag=0,0 | LineTo 68,0 | LineTo 88,31 | LineTo 68,62 | LineTo 0,62 | CurveTo -6,56,-6,6,0,0 | ClosePath 1
Glow=3,3 | LineTo 65,3 | LineTo 80,31 | LineTo 65,59 | LineTo 3,59 | CurveTo 0,56,0,6,3,3 | ClosePath 1
LeftMouseUpAction=[!CommandMeasure MeasureTimeline "CenterNow()"]
ToolTipText=Return to current event
DynamicVariables=1

