[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
Group=Blipline
ContextTitle=Open Blipline Settings
ContextAction=[!ActivateConfig "#ROOTCONFIG#\Control" "Settings.ini"]

[Metadata]
Name=Blipline - Calendar Import
Author=PetersMinistry
Information=Calendar feed import and management panel for Blipline.
Version=0.3.19
License=MIT

[Variables]
SettingsInc=#@#UserSettings.inc
FontText=Segoe UI Semilight
FontTitle=Segoe UI
PanelEdge=255,255,255,54
TextColor=245,248,252,245
SoftText=205,214,224,230
MutedText=158,168,181,220
AccentColor=255,199,50,220
AccentSoft=150,112,8,220
ButtonFill=255,255,255,14
ButtonEdge=255,255,255,46
DangerFill=120,35,35,170
DangerEdge=255,120,120,180
InputFill=255,255,255,18
InputEdge=255,255,255,54
UiCalendarImportTitle=Add Calendars
UiCalendarImportHelp1=Copy the Secret address in iCal format from Google Calendar.
UiCalendarImportHelp2=You can copy one link or several links, one per line.
UiAddIcalLinks=Add iCal Link(s)
UiConnectedCalendars=Connected calendars
UiRemove=Remove
UiClearAllCalendars=Clear All
UiConfirmClear=Confirm Clear
UiOpenGoogleCalendar=Open Google Calendar
UiBackSettings=Settings
@Include=#@#UserSettings.inc

[MeasureFetchAgenda]
Measure=Plugin
Plugin=RunCommand
Program=%SystemRoot%\System32\WindowsPowerShell\v1.0\powershell.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#Scripts\Update-Agenda.ps1" -SettingsPath "#SettingsInc#" -OutputPath "#@#Cache\Agenda.inc"
State=Hide
UpdateDivider=-1
FinishAction=[!Refresh "#ROOTCONFIG#\Control"][!Refresh "#ROOTCONFIG#\Timeline"]

[MeasureImportAdd]
Measure=Plugin
Plugin=RunCommand
Program=%SystemRoot%\System32\WindowsPowerShell\v1.0\powershell.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#Scripts\Import-FeedList.ps1" -SettingsPath "#SettingsInc#" -MaxFeeds "#CalendarSlots#" -Mode Add
State=Hide
UpdateDivider=-1
FinishAction=[!CommandMeasure MeasureFetchAgenda "Run"][!Refresh "#ROOTCONFIG#\Control" "Import.ini"]
DynamicVariables=1

