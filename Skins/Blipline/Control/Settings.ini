[MeasureStyleState]
Measure=Calc
Formula=#TimelineStyleIndex#
IfCondition=(MeasureStyleState = 1)
IfTrueAction=[!SetVariable GlassFill "#AccentSoft#"][!SetVariable GlassEdge "#AccentColor#"][!SetVariable DenseFill "#ButtonFill#"][!SetVariable DenseEdge "#ButtonEdge#"][!SetVariable FocusFill "#ButtonFill#"][!SetVariable FocusEdge "#ButtonEdge#"]
IfCondition2=(MeasureStyleState = 2)
IfTrueAction2=[!SetVariable GlassFill "#ButtonFill#"][!SetVariable GlassEdge "#ButtonEdge#"][!SetVariable DenseFill "#AccentSoft#"][!SetVariable DenseEdge "#AccentColor#"][!SetVariable FocusFill "#ButtonFill#"][!SetVariable FocusEdge "#ButtonEdge#"]
IfCondition3=(MeasureStyleState = 3)
IfTrueAction3=[!SetVariable GlassFill "#ButtonFill#"][!SetVariable GlassEdge "#ButtonEdge#"][!SetVariable DenseFill "#ButtonFill#"][!SetVariable DenseEdge "#ButtonEdge#"][!SetVariable FocusFill "#AccentSoft#"][!SetVariable FocusEdge "#AccentColor#"]
DynamicVariables=1

