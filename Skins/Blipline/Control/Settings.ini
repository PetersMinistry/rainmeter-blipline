[MeasureTimeFormatState]
Measure=Calc
Formula=#TimeFormat#
IfCondition=(MeasureTimeFormatState = 24)
IfTrueAction=[!SetVariable Time12Fill "#ButtonFill#"][!SetVariable Time12Edge "#ButtonEdge#"][!SetVariable Time24Fill "#AccentSoft#"][!SetVariable Time24Edge "#AccentColor#"]
IfFalseAction=[!SetVariable Time12Fill "#AccentSoft#"][!SetVariable Time12Edge "#AccentColor#"][!SetVariable Time24Fill "#ButtonFill#"][!SetVariable Time24Edge "#ButtonEdge#"]
DynamicVariables=1

[MeasureRefreshIntervalState]
Measure=Calc
Formula=#RefreshSeconds#
IfCondition=(MeasureRefreshIntervalState <= 60)
IfTrueAction=[!SetVariable Refresh1Fill "#AccentSoft#"][!SetVariable Refresh1Edge "#AccentColor#"][!SetVariable Refresh5Fill "#ButtonFill#"][!SetVariable Refresh5Edge "#ButtonEdge#"][!SetVariable Refresh10Fill "#ButtonFill#"][!SetVariable Refresh10Edge "#ButtonEdge#"][!SetVariable Refresh15Fill "#ButtonFill#"][!SetVariable Refresh15Edge "#ButtonEdge#"]
IfCondition2=(MeasureRefreshIntervalState > 60) && (MeasureRefreshIntervalState <= 300)
IfTrueAction2=[!SetVariable Refresh1Fill "#ButtonFill#"][!SetVariable Refresh1Edge "#ButtonEdge#"][!SetVariable Refresh5Fill "#AccentSoft#"][!SetVariable Refresh5Edge "#AccentColor#"][!SetVariable Refresh10Fill "#ButtonFill#"][!SetVariable Refresh10Edge "#ButtonEdge#"][!SetVariable Refresh15Fill "#ButtonFill#"][!SetVariable Refresh15Edge "#ButtonEdge#"]
IfCondition3=(MeasureRefreshIntervalState > 300) && (MeasureRefreshIntervalState <= 600)
IfTrueAction3=[!SetVariable Refresh1Fill "#ButtonFill#"][!SetVariable Refresh1Edge "#ButtonEdge#"][!SetVariable Refresh5Fill "#ButtonFill#"][!SetVariable Refresh5Edge "#ButtonEdge#"][!SetVariable Refresh10Fill "#AccentSoft#"][!SetVariable Refresh10Edge "#AccentColor#"][!SetVariable Refresh15Fill "#ButtonFill#"][!SetVariable Refresh15Edge "#ButtonEdge#"]
IfCondition4=(MeasureRefreshIntervalState > 600)
IfTrueAction4=[!SetVariable Refresh1Fill "#ButtonFill#"][!SetVariable Refresh1Edge "#ButtonEdge#"][!SetVariable Refresh5Fill "#ButtonFill#"][!SetVariable Refresh5Edge "#ButtonEdge#"][!SetVariable Refresh10Fill "#ButtonFill#"][!SetVariable Refresh10Edge "#ButtonEdge#"][!SetVariable Refresh15Fill "#AccentSoft#"][!SetVariable Refresh15Edge "#AccentColor#"]
DynamicVariables=1

[MeasureScaleDown]
Measure=Calc
Formula=Min(Max(#UiScale#-5,#UiScaleMin#),#UiScaleMax#)
DynamicVariables=1

[MeasureScaleUp]
Measure=Calc
Formula=Min(Max(#UiScale#+5,#UiScaleMin#),#UiScaleMax#)
DynamicVariables=1

