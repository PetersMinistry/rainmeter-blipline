[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,255
Group=Blipline
ContextTitle=Close Settings
ContextAction=[!DeactivateConfig "#ROOTCONFIG#\Control"]

[Metadata]
Name=Blipline - Settings
Author=PetersMinistry
Information=Setup panel for Blipline calendar feeds and timeline style.
Version=0.3.12
License=MIT

[Variables]
@Include=#@#UserSettings.inc
SettingsInc=#@#UserSettings.inc
FontText=Segoe UI Semilight
FontTitle=Segoe UI
InputFill=255,255,255,18
InputEdge=255,255,255,54
ButtonFill=255,255,255,14
ButtonEdge=255,255,255,46
TemplateFill1=255,255,255,14
TemplateEdge1=255,255,255,46
TemplateFill2=255,255,255,14
TemplateEdge2=255,255,255,46
TemplateFill3=255,255,255,14
TemplateEdge3=255,255,255,46
TemplateFill4=255,255,255,14
TemplateEdge4=255,255,255,46
TemplateFill5=255,255,255,14
TemplateEdge5=255,255,255,46
TemplateFill6=255,255,255,14
TemplateEdge6=255,255,255,46
TemplateFill7=255,255,255,14
TemplateEdge7=255,255,255,46
PaletteEdge=255,255,255,72
PaletteActiveEdge=255,199,50,220
ColorSaveStatus=
ToggleCalNext=(1-#ShowCalendarName#)
ToggleLocNext=(1-#ShowEventLocation#)
ToggleNotesNext=(1-#ShowEventNotes#)

[MeasureFetchAgenda]
Measure=Plugin
Plugin=RunCommand
Program=%SystemRoot%\System32\WindowsPowerShell\v1.0\powershell.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#Scripts\Update-Agenda.ps1" -SettingsPath "#SettingsInc#" -OutputPath "#@#Cache\Agenda.inc"
State=Hide
UpdateDivider=-1
FinishAction=[!Refresh "#ROOTCONFIG#\Timeline"]

[MeasureImportFeeds]
Measure=Plugin
Plugin=RunCommand
Program=%SystemRoot%\System32\WindowsPowerShell\v1.0\powershell.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#Scripts\Import-FeedList.ps1" -SettingsPath "#SettingsInc#" -MaxFeeds "#CalendarSlots#"
State=Hide
UpdateDivider=-1
FinishAction=[!CommandMeasure MeasureFetchAgenda "Run"][!Refresh "#ROOTCONFIG#\Control"][!Refresh "#ROOTCONFIG#\Timeline"]
DynamicVariables=1

[MeasureClearFeeds]
Measure=Plugin
Plugin=RunCommand
Program=%SystemRoot%\System32\WindowsPowerShell\v1.0\powershell.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#Scripts\Import-FeedList.ps1" -SettingsPath "#SettingsInc#" -MaxFeeds "#CalendarSlots#" -Clear
State=Hide
UpdateDivider=-1
FinishAction=[!CommandMeasure MeasureFetchAgenda "Run"][!Refresh "#ROOTCONFIG#\Control"][!Refresh "#ROOTCONFIG#\Timeline"]
DynamicVariables=1

[MeasureToggleCalendar]
Measure=Calc
Formula=(1-#ShowCalendarName#)
DynamicVariables=1

[MeasureToggleLocation]
Measure=Calc
Formula=(1-#ShowEventLocation#)
DynamicVariables=1

[MeasureToggleNotes]
Measure=Calc
Formula=(1-#ShowEventNotes#)
DynamicVariables=1

[MeasureColorInput1]
Measure=Plugin
Plugin=InputText
X=44
Y=148
W=128
H=24
FontFace=#FontText#
FontSize=8
FontColor=#TextColor#
SolidColor=18,23,31,246
TopMost=1
FocusDismiss=0
DefaultValue=#CalendarColor1#
DynamicVariables=1
Command1=[!WriteKeyValue Variables CalendarColor1 "$UserInput$" "#SettingsInc#"][!CommandMeasure MeasureFetchAgenda "Run"][!Refresh "#ROOTCONFIG#\Control"]

