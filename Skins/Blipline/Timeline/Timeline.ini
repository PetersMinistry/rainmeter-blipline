[MeasureFetchAgenda]
Measure=Plugin
Plugin=RunCommand
Program=%SystemRoot%\System32\WindowsPowerShell\v1.0\powershell.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#Scripts\Update-Agenda.ps1" -SettingsPath "#@#UserSettings.inc" -OutputPath "#@#Cache\Agenda.inc"
State=Hide
UpdateDivider=-1
FinishAction=[!CommandMeasure MeasureTimeline "ReadAgenda()"]
DynamicVariables=1

[MeasureTimeline]
Measure=Script
ScriptFile=#@#Scripts\Timeline.lua
CachePath=#@#Cache\Agenda.inc
UpdateDivider=1

[MeterCountdownConnector]
Meter=Shape
X=0
Y=0
Shape=Rectangle #ConnectorX#,#ActiveRuleY#,#ConnectorW#,1,1 | Fill Color #AccentSoft# | StrokeWidth 0
Shape2=Ellipse (#ConnectorX# + #ConnectorW# - 2),(#ActiveRuleY# - 2),5,5 | Fill Color #AccentSoft# | StrokeWidth 0
