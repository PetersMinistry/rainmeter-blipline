[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
Group=Blipline
ContextTitle=Close Settings
ContextAction=[!DeactivateConfig "#ROOTCONFIG#\Control"]

[Metadata]
Name=Blipline - Settings
Author=PetersMinistry
Information=Setup panel for Blipline calendar feeds and timeline style.
Version=0.2.0
License=MIT

[Variables]
@Include=#@#UserSettings.inc
SettingsInc=#@#UserSettings.inc
FontText=Segoe UI Semilight
FontTitle=Segoe UI
InputFill=255,255,255,18
InputEdge=255,255,255,54
ButtonFill=255,255,255,14
ButtonEdge=255,255,255,46
GlassFill=255,255,255,14
GlassEdge=255,255,255,46
DenseFill=255,255,255,14
DenseEdge=255,255,255,46
FocusFill=255,255,255,14
FocusEdge=255,255,255,46

[MeasureFetchAgenda]
Measure=Plugin
Plugin=RunCommand
Program=%SystemRoot%\System32\WindowsPowerShell\v1.0\powershell.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#Scripts\Update-Agenda.ps1" -SettingsPath "#SettingsInc#" -OutputPath "#@#Cache\Agenda.inc"
State=Hide
UpdateDivider=-1
FinishAction=[!Refresh "#ROOTCONFIG#\Timeline"]

[MeasureImportFeeds]
Measure=Plugin
Plugin=RunCommand
Program=%SystemRoot%\System32\WindowsPowerShell\v1.0\powershell.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#Scripts\Import-FeedList.ps1" -SettingsPath "#SettingsInc#" -MaxFeeds "#CalendarSlots#"
State=Hide
UpdateDivider=-1
FinishAction=[!CommandMeasure MeasureFetchAgenda "Run"][!Refresh "#ROOTCONFIG#\Control"][!Refresh "#ROOTCONFIG#\Timeline"]
DynamicVariables=1

[MeasureClearFeeds]
Measure=Plugin
Plugin=RunCommand
Program=%SystemRoot%\System32\WindowsPowerShell\v1.0\powershell.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#Scripts\Import-FeedList.ps1" -SettingsPath "#SettingsInc#" -MaxFeeds "#CalendarSlots#" -Clear
State=Hide
UpdateDivider=-1
FinishAction=[!CommandMeasure MeasureFetchAgenda "Run"][!Refresh "#ROOTCONFIG#\Control"][!Refresh "#ROOTCONFIG#\Timeline"]
DynamicVariables=1

[MeasureColorInput1]
Measure=Plugin
Plugin=InputText
X=44
Y=148
W=128
H=24
FontFace=#FontText#
FontSize=8
FontColor=#TextColor#
SolidColor=18,23,31,246
TopMost=1
FocusDismiss=0
DefaultValue=#CalendarColor1#
DynamicVariables=1
Command1=[!WriteKeyValue Variables CalendarColor1 "$UserInput$" "#SettingsInc#"][!CommandMeasure MeasureFetchAgenda "Run"][!Refresh "#ROOTCONFIG#\Control"]

[MeasureColorInput2]
Measure=Plugin
Plugin=InputText
X=44
Y=184
W=128
H=24
FontFace=#FontText#
FontSize=8
FontColor=#TextColor#
SolidColor=18,23,31,246
TopMost=1
FocusDismiss=0
DefaultValue=#CalendarColor2#
DynamicVariables=1
Command1=[!WriteKeyValue Variables CalendarColor2 "$UserInput$" "#SettingsInc#"][!CommandMeasure MeasureFetchAgenda "Run"][!Refresh "#ROOTCONFIG#\Control"]

[MeasureColorInput3]
Measure=Plugin
Plugin=InputText
X=44
Y=220
W=128
H=24
FontFace=#FontText#
FontSize=8
FontColor=#TextColor#
SolidColor=18,23,31,246
TopMost=1
FocusDismiss=0
DefaultValue=#CalendarColor3#
DynamicVariables=1
Command1=[!WriteKeyValue Variables CalendarColor3 "$UserInput$" "#SettingsInc#"][!CommandMeasure MeasureFetchAgenda "Run"][!Refresh "#ROOTCONFIG#\Control"]

[MeasureStyleState]
Measure=Calc
Formula=#TimelineStyleIndex#
IfCondition=(MeasureStyleState = 1)
IfTrueAction=[!SetVariable GlassFill "#AccentSoft#"][!SetVariable GlassEdge "#AccentColor#"][!SetVariable DenseFill "#ButtonFill#"][!SetVariable DenseEdge "#ButtonEdge#"][!SetVariable FocusFill "#ButtonFill#"][!SetVariable FocusEdge "#ButtonEdge#"]
IfCondition2=(MeasureStyleState = 2)
IfTrueAction2=[!SetVariable GlassFill "#ButtonFill#"][!SetVariable GlassEdge "#ButtonEdge#"][!SetVariable DenseFill "#AccentSoft#"][!SetVariable DenseEdge "#AccentColor#"][!SetVariable FocusFill "#ButtonFill#"][!SetVariable FocusEdge "#ButtonEdge#"]
IfCondition3=(MeasureStyleState = 3)
IfTrueAction3=[!SetVariable GlassFill "#ButtonFill#"][!SetVariable GlassEdge "#ButtonEdge#"][!SetVariable DenseFill "#ButtonFill#"][!SetVariable DenseEdge "#ButtonEdge#"][!SetVariable FocusFill "#AccentSoft#"][!SetVariable FocusEdge "#AccentColor#"]
DynamicVariables=1

[MeterPanel]
Meter=Shape
X=0
Y=0
Shape=Rectangle 0,0,386,424,14 | Fill Color #PanelFill# | StrokeWidth 1 | Stroke Color #PanelEdge#
Shape2=Rectangle 1,1,384,422,14 | Fill Color 255,255,255,5 | StrokeWidth 0

