[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
Group=Blipline
OnRefreshAction=[!CommandMeasure MeasureFetchAgenda "Run"]
ContextTitle=Refresh Blipline
ContextAction=[!CommandMeasure MeasureFetchAgenda "Run"]
ContextTitle2=Open Google Calendar
ContextAction2=["#OpenCalendarUrl#"]
ContextTitle3=Open Blipline Settings
ContextAction3=[!ActivateConfig "#ROOTCONFIG#\Control" "Settings.ini"]

[Metadata]
Name=Blipline
Author=PetersMinistry
Information=Upcoming schedule timeline with next-event countdown for iCal calendar feeds.
Version=0.1.0
License=MIT

[Variables]
@Include=#@#UserSettings.inc
HeaderDate=TODAY
LastUpdated=Not updated yet
SourceStatus=Waiting for refresh
CountdownLabel=NEXT
CountdownNumber=--
CountdownUnit=min
CountdownY=134
ActiveRuleY=162
FontText=Segoe UI Semilight
FontTitle=Segoe UI
TimelineX=224
TimeX=198
TitleX=252
Row1Time=
Row1Title=
Row1Location=
Row1Color=255,255,255,0
Row1TextColor=255,255,255,0
Row1SubColor=255,255,255,0
Row1DotSize=8
Row2Time=
Row2Title=
Row2Location=
Row2Color=255,255,255,0
Row2TextColor=255,255,255,0
Row2SubColor=255,255,255,0
Row2DotSize=8
Row3Time=
Row3Title=
Row3Location=
Row3Color=255,255,255,0
Row3TextColor=255,255,255,0
Row3SubColor=255,255,255,0
Row3DotSize=8
Row4Time=
Row4Title=
Row4Location=
Row4Color=255,255,255,0
Row4TextColor=255,255,255,0
Row4SubColor=255,255,255,0
Row4DotSize=8
Row5Time=
Row5Title=
Row5Location=
Row5Color=255,255,255,0
Row5TextColor=255,255,255,0
Row5SubColor=255,255,255,0
Row5DotSize=8
Row6Time=
Row6Title=
Row6Location=
Row6Color=255,255,255,0
Row6TextColor=255,255,255,0
Row6SubColor=255,255,255,0
Row6DotSize=8

[MeasureFetchAgenda]
Measure=Plugin
Plugin=RunCommand
Program=%SystemRoot%\System32\WindowsPowerShell\v1.0\powershell.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#Scripts\Update-Agenda.ps1" -SettingsPath "#@#UserSettings.inc" -OutputPath "#@#Cache\Agenda.inc"
State=Hide
UpdateDivider=#RefreshSeconds#
FinishAction=[!CommandMeasure MeasureTimeline "ReadAgenda()"]
DynamicVariables=1

[MeasureTimeline]
Measure=Script
ScriptFile=#@#Scripts\Timeline.lua
CachePath=#@#Cache\Agenda.inc
UpdateDivider=1

[MeterCountdownConnector]
Meter=Shape
X=0
Y=0
Shape=Rectangle 82,#ActiveRuleY#,7,1,1 | Fill Color #AccentSoft# | StrokeWidth 0
Shape2=Rectangle 94,#ActiveRuleY#,7,1,1 | Fill Color #AccentSoft# | StrokeWidth 0
Shape3=Rectangle 106,#ActiveRuleY#,7,1,1 | Fill Color #AccentSoft# | StrokeWidth 0
Shape4=Rectangle 118,#ActiveRuleY#,7,1,1 | Fill Color #AccentSoft# | StrokeWidth 0
Shape5=Rectangle 130,#ActiveRuleY#,7,1,1 | Fill Color #AccentSoft# | StrokeWidth 0
Shape6=Rectangle 142,#ActiveRuleY#,7,1,1 | Fill Color #AccentSoft# | StrokeWidth 0
Shape7=Rectangle 154,#ActiveRuleY#,7,1,1 | Fill Color #AccentSoft# | StrokeWidth 0
Shape8=Rectangle 166,#ActiveRuleY#,7,1,1 | Fill Color #AccentSoft# | StrokeWidth 0
Shape9=Rectangle 178,#ActiveRuleY#,7,1,1 | Fill Color #AccentSoft# | StrokeWidth 0
Shape10=Rectangle 190,#ActiveRuleY#,7,1,1 | Fill Color #AccentSoft# | StrokeWidth 0
Shape11=Rectangle 202,#ActiveRuleY#,7,1,1 | Fill Color #AccentSoft# | StrokeWidth 0
DynamicVariables=1

[MeterCountdownTag]
Meter=Shape
X=8
Y=#CountdownY#
Shape=Path Tag | Fill Color 12,16,22,206 | StrokeWidth 1 | Stroke Color #AccentColor#
Shape2=Path Glow | Fill Color 255,199,50,38 | StrokeWidth 0
Tag=0,0 | LineTo 56,0 | LineTo 76,31 | LineTo 56,62 | LineTo 0,62 | CurveTo -8,62,-8,0,0,0 | ClosePath 1
Glow=2,2 | LineTo 54,2 | LineTo 70,31 | LineTo 54,60 | LineTo 2,60 | ClosePath 1
DynamicVariables=1

[MeterCountdownNumber]
Meter=String
X=36
Y=(#CountdownY# + 13)
W=36
H=28
FontFace=#FontTitle#
FontColor=#AccentColor#
FontSize=20
StringAlign=Center
AntiAlias=1
Text=#CountdownNumber#
DynamicVariables=1

[MeterCountdownUnit]
Meter=String
X=36
Y=(#CountdownY# + 39)
W=42
H=16
FontFace=#FontText#
FontColor=224,214,162,238
FontSize=8
StringAlign=Center
AntiAlias=1
Text=#CountdownUnit#
DynamicVariables=1

[MeterPanel]
Meter=Shape
X=92
Y=22
Shape=Rectangle 0,0,360,396,14 | Fill Color #PanelFill# | StrokeWidth 1 | Stroke Color #PanelEdge#
Shape2=Rectangle 1,1,358,394,14 | Fill Color 255,255,255,5 | StrokeWidth 0
Shape3=Rectangle 18,18,324,1,1 | Fill Color 255,255,255,18 | StrokeWidth 0

[MeterHeaderDate]
