RowSubSize=9
RowTitleW=238
RowDetailW=246

[MeasureFetchAgenda]
Measure=Plugin
Plugin=RunCommand
Program=%SystemRoot%\System32\WindowsPowerShell\v1.0\powershell.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#Scripts\Update-Agenda.ps1" -SettingsPath "#@#UserSettings.inc" -OutputPath "#@#Cache\Agenda.inc"
State=Hide
UpdateDivider=#RefreshSeconds#
FinishAction=[!CommandMeasure MeasureTimeline "ReadAgenda()"]
DynamicVariables=1

[MeasureTimeline]
Measure=Script
ScriptFile=#@#Scripts\Timeline.lua
CachePath=#@#Cache\Agenda.inc
UpdateDivider=1

[MeterCountdownConnector]
Meter=Shape
X=0
Y=0
Shape=Rectangle 82,#ActiveRuleY#,7,1,1 | Fill Color #AccentSoft# | StrokeWidth 0
Shape2=Rectangle 94,#ActiveRuleY#,7,1,1 | Fill Color #AccentSoft# | StrokeWidth 0
Shape3=Rectangle 106,#ActiveRuleY#,7,1,1 | Fill Color #AccentSoft# | StrokeWidth 0
Shape4=Rectangle 118,#ActiveRuleY#,7,1,1 | Fill Color #AccentSoft# | StrokeWidth 0
Shape5=Rectangle 130,#ActiveRuleY#,7,1,1 | Fill Color #AccentSoft# | StrokeWidth 0
