[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
Group=Blipline
ContextTitle=Close Settings
ContextAction=[!DeactivateConfig "#ROOTCONFIG#\Control"]

[Metadata]
Name=Blipline - Settings
Author=PetersMinistry
Information=Setup panel for Blipline calendar feeds and agenda range.
Version=0.2.0
License=MIT

[Variables]
@Include=#@#UserSettings.inc
SettingsInc=#@#UserSettings.inc
FontText=Segoe UI Semilight
FontTitle=Segoe UI
InputFill=255,255,255,18
InputEdge=255,255,255,54
ButtonFill=255,255,255,14
ButtonEdge=255,255,255,46
TodayFill=255,255,255,14
TodayEdge=255,255,255,46
ThreeFill=255,255,255,14
ThreeEdge=255,255,255,46
WeekFill=255,255,255,14
WeekEdge=255,255,255,46

[MeasureFetchAgenda]
Measure=Plugin
Plugin=RunCommand
Program=%SystemRoot%\System32\WindowsPowerShell\v1.0\powershell.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#Scripts\Update-Agenda.ps1" -SettingsPath "#SettingsInc#" -OutputPath "#@#Cache\Agenda.inc"
State=Hide
UpdateDivider=-1
FinishAction=[!Refresh "#ROOTCONFIG#\Timeline"]

[MeasureCalendarInput1]
Measure=Plugin
Plugin=InputText
X=82
Y=148
W=282
H=24
FontFace=#FontText#
FontSize=8
FontColor=#TextColor#
SolidColor=18,23,31,246
TopMost=1
FocusDismiss=0
DefaultValue=#CalendarUrl#
DynamicVariables=1
Command1=[!WriteKeyValue Variables CalendarUrl "$UserInput$" "#SettingsInc#"][!CommandMeasure MeasureFetchAgenda "Run"][!Refresh "#ROOTCONFIG#\Control"]

[MeasureCalendarInput2]
Measure=Plugin
Plugin=InputText
X=82
Y=184
W=282
H=24
FontFace=#FontText#
FontSize=8
FontColor=#TextColor#
SolidColor=18,23,31,246
TopMost=1
FocusDismiss=0
DefaultValue=#CalendarUrl2#
DynamicVariables=1
Command1=[!WriteKeyValue Variables CalendarUrl2 "$UserInput$" "#SettingsInc#"][!CommandMeasure MeasureFetchAgenda "Run"][!Refresh "#ROOTCONFIG#\Control"]

[MeasureCalendarInput3]
Measure=Plugin
Plugin=InputText
X=82
Y=220
W=282
H=24
FontFace=#FontText#
FontSize=8
FontColor=#TextColor#
SolidColor=18,23,31,246
TopMost=1
FocusDismiss=0
DefaultValue=#CalendarUrl3#
DynamicVariables=1
Command1=[!WriteKeyValue Variables CalendarUrl3 "$UserInput$" "#SettingsInc#"][!CommandMeasure MeasureFetchAgenda "Run"][!Refresh "#ROOTCONFIG#\Control"]

[MeasureRangeState]
Measure=Calc
Formula=#DaysAhead#
IfCondition=(MeasureRangeState = 1)
IfTrueAction=[!SetVariable TodayFill "#AccentSoft#"][!SetVariable TodayEdge "#AccentColor#"][!SetVariable ThreeFill "#ButtonFill#"][!SetVariable ThreeEdge "#ButtonEdge#"][!SetVariable WeekFill "#ButtonFill#"][!SetVariable WeekEdge "#ButtonEdge#"]
IfCondition2=(MeasureRangeState = 3)
IfTrueAction2=[!SetVariable TodayFill "#ButtonFill#"][!SetVariable TodayEdge "#ButtonEdge#"][!SetVariable ThreeFill "#AccentSoft#"][!SetVariable ThreeEdge "#AccentColor#"][!SetVariable WeekFill "#ButtonFill#"][!SetVariable WeekEdge "#ButtonEdge#"]
IfCondition3=(MeasureRangeState = 7)
IfTrueAction3=[!SetVariable TodayFill "#ButtonFill#"][!SetVariable TodayEdge "#ButtonEdge#"][!SetVariable ThreeFill "#ButtonFill#"][!SetVariable ThreeEdge "#ButtonEdge#"][!SetVariable WeekFill "#AccentSoft#"][!SetVariable WeekEdge "#AccentColor#"]
DynamicVariables=1

[MeterPanel]
Meter=Shape
X=0
Y=0
Shape=Rectangle 0,0,386,424,14 | Fill Color #PanelFill# | StrokeWidth 1 | Stroke Color #PanelEdge#
Shape2=Rectangle 1,1,384,422,14 | Fill Color 255,255,255,5 | StrokeWidth 0

[MeterTitle]
Meter=String
X=22
Y=18
W=280
H=26
FontFace=#FontTitle#
FontColor=#TextColor#
FontSize=16
AntiAlias=1
Text=Blipline

[MeterCloseButton]
