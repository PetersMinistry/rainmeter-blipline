X=356
Y=20
W=24
H=20
FontFace=#FontTitle#
FontColor=#MutedText#
FontSize=10
StringAlign=Center
AntiAlias=1
Text=X
LeftMouseUpAction=[!DeactivateConfig "#ROOTCONFIG#\Control"]

[MeterSubtitle]
