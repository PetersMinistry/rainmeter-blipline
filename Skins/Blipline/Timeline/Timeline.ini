[MeterTimelineLine]
Meter=Shape
X=0
Y=0
Shape=Rectangle #TimelineX#,92,1,300,1 | Fill Color #LineColor# | StrokeWidth 0

[MeterActiveGlow]
Meter=Shape
X=(#TimelineX# - 11)
Y=(#ActiveRuleY# - 10)
Shape=Ellipse 0,0,22,22 | Fill Color 255,199,50,42 | StrokeWidth 0
Shape2=Ellipse 5,5,12,12 | Fill Color 255,199,50,86 | StrokeWidth 0
